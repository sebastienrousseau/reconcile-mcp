name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Installs this package editable (so coverage collects); the only
      # runtime dependency, `mcp`, resolves from PyPI.
      - name: Install this package
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov

      # The pyproject addopts enforce --cov-branch --cov-fail-under=100, so a
      # coverage regression fails the build here.
      - name: Run tests
        run: pytest tests/ -v --tb=short

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install this package
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install ruff black mypy

      - name: Ruff check
        run: ruff check reconcile_mcp/ tests/

      - name: Black check
        run: black --check reconcile_mcp/ tests/

      - name: Mypy
        run: mypy reconcile_mcp/
